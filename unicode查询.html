<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode 字符查询工具 - 增强版</title>
<style>
:root {
  --bg: #f8f9fa;
  --card: #ffffff;
  --text: #212529;
  --muted: #6c757d;
  --border: #dee2e6;
  --accent: #3a7ebf;
  --accent-hover: #2e6599;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
  --cell-size: 52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ===== 搜索栏 ===== */
.search-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 56px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px;
  z-index: 100; gap: 8px;
  box-shadow: var(--shadow);
}
.search-bar .icon { font-size: 20px; opacity: 0.5; }
.search-bar input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 14px;
  outline: none;
  transition: border .2s;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar button {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 8px 18px;
  font-size: 14px; cursor: pointer;
  transition: background .2s;
}
.search-bar button:hover { background: var(--accent-hover); }

/* ===== 左侧边栏 ===== */
.sidebar {
  width: 200px; min-width: 200px;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 76px 12px 20px;
  display: flex; flex-direction: column; gap: 6px;
  overflow-y: auto;
}
.sidebar h2 {
  font-size: 16px; font-weight: 700;
  padding: 0 8px 8px; color: var(--text);
}
.sidebar .nav-btn {
  display: block; width: 100%; text-align: left;
  padding: 10px 12px; border: none; border-radius: 8px;
  background: transparent; color: var(--text);
  font-size: 14px; cursor: pointer;
  transition: background .15s;
}
.sidebar .nav-btn:hover { background: #e9ecef; }
.sidebar .nav-btn.active { background: var(--accent); color: #fff; }

.sidebar .sep {
  height: 1px; background: var(--border);
  margin: 8px 0;
}
.sidebar .theme-toggle {
  padding: 0 8px; display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--muted);
}
.sidebar .fav-count {
  padding: 0 8px; font-size: 12px; color: var(--muted);
}
.sidebar .unicode-version {
  padding: 4px 8px 0; font-size: 11px; color: var(--muted);
  cursor: pointer; transition: color .15s;
}
.sidebar .unicode-version:hover { color: var(--accent); }

/* ===== 主内容区 ===== */
.main {
  flex: 1; display: flex; flex-direction: column;
  padding: 76px 20px 20px; overflow: hidden;
}
.main-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; flex-shrink: 0;
}
.main-header h1 { font-size: 20px; }
.main-header .count { font-size: 13px; color: var(--muted); }

/* 控制栏（随机/收藏分区用） */
.control-bar {
  display: none;
  padding: 0 0 12px;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.control-bar select,
.control-bar input[type="number"] {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 13px;
  background: var(--card);
  color: var(--text);
  outline: none;
  transition: border .2s;
}
.control-bar select:focus,
.control-bar input:focus { border-color: var(--accent); }
.control-bar button {
  background: var(--accent); color: #fff; border: none;
  border-radius: 6px; padding: 6px 14px;
  font-size: 13px; cursor: pointer;
  transition: background .15s;
}
.control-bar button:hover { background: var(--accent-hover); }
.control-bar button.toggle-btn {
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border);
}
.control-bar button.toggle-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
}
.control-bar button.toggle-btn:hover:not(.active) { background: #e9ecef; }
.control-bar .ctrl-label { font-size: 13px; color: var(--muted); }

.content-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
}

/* 字符网格 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--cell-size), 1fr));
  gap: 6px;
}
.cell {
  aspect-ratio: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  position: relative;
  transition: transform .1s, box-shadow .1s, border-color .1s;
  user-select: none;
}
.cell:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
  border-color: var(--accent);
}
.cell .ch {
  font-size: 22px; line-height: 1;
  font-family: "Segoe UI Symbol", "Noto Sans", "Apple Color Emoji", sans-serif;
}
.cell .cp {
  font-size: 9px; font-family: Consolas, monospace;
  color: var(--muted); margin-top: 2px;
}
.cell .fav-star {
  position: absolute; top: 2px; left: 4px;
  font-size: 10px; color: #ff9800;
}

/* 区块列表 / 类别列表 */
.list-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px;
  margin-bottom: 8px; cursor: pointer;
  transition: box-shadow .15s, border-color .15s;
}
.list-item:hover {
  box-shadow: var(--shadow-hover);
  border-color: var(--accent);
}
.list-item .title { font-size: 15px; font-weight: 600; }
.list-item .desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* 收藏分组 */
.fav-group {
  margin-bottom: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.fav-group-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--bg);
  cursor: pointer; user-select: none;
  transition: background .15s;
}
.fav-group-header:hover { background: #e9ecef; }
.fav-group-arrow { font-size: 12px; color: var(--muted); width: 14px; }
.fav-group-title { font-size: 14px; font-weight: 600; flex: 1; }
.fav-group-count { font-size: 12px; color: var(--muted); }
.fav-group-body { padding: 10px; }

/* 分页 */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; padding: 12px 0; flex-shrink: 0;
}
.pagination button {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 16px;
  font-size: 13px; cursor: pointer;
  transition: background .15s;
}
.pagination button:hover:not(:disabled) { background: #e9ecef; }
.pagination button:disabled { opacity: 0.4; cursor: default; }

/* ===== 弹窗 ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--card); border-radius: 16px;
  width: 520px; max-width: 90vw;
  max-height: 85vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  transform: translateY(20px) scale(0.96);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
.modal-overlay.show .modal { transform: translateY(0) scale(1); }
.modal.wide { width: 580px; }
.modal-header {
  padding: 20px 24px 0; text-align: center;
}
.modal-header .big-char {
  font-size: 72px; line-height: 1;
  font-family: "Segoe UI Symbol", "Noto Sans", sans-serif;
}
.modal-header .name {
  font-size: 16px; font-weight: 700; margin-top: 6px;
}
.modal-header .code {
  font-size: 13px; color: var(--muted); font-family: Consolas, monospace;
  margin-top: 2px;
}
.modal-body {
  flex: 1; overflow-y: auto; padding: 16px 24px;
}
.modal-section {
  margin-bottom: 14px;
}
.modal-section h3 {
  font-size: 14px; font-weight: 700;
  margin-bottom: 6px; color: var(--text);
}
.modal-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 4px 0; border-bottom: 1px solid #f0f0f0;
  font-size: 13px;
}
.modal-row .label { color: var(--muted); min-width: 100px; }
.modal-row .value { font-family: Consolas, monospace; text-align: right; flex: 1; word-break: break-all; }
.modal-footer {
  padding: 12px 24px 20px;
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  border-top: 1px solid var(--border);
}
.modal-footer button {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 8px 14px;
  font-size: 13px; cursor: pointer;
  transition: background .15s;
}
.modal-footer button:hover { background: var(--accent-hover); }
.modal-footer button.secondary {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
}
.modal-footer button.secondary:hover { background: #e9ecef; }

.modal-close {
  position: absolute; top: 12px; right: 16px;
  background: none; border: none; font-size: 20px;
  cursor: pointer; color: var(--muted); z-index: 10;
}
.modal-close:hover { color: var(--text); }

/* 设置面板专用 */
.settings-section { margin-bottom: 18px; }
.settings-section h3 {
  font-size: 14px; font-weight: 700; margin-bottom: 8px;
}
.settings-section p {
  font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.5;
}
.settings-section a { color: var(--accent); text-decoration: none; }
.settings-section a:hover { text-decoration: underline; }
.settings-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 5px 0; border-bottom: 1px solid #f0f0f0;
  font-size: 13px;
}
.settings-row .label { color: var(--muted); }
.settings-row .value { font-family: Consolas, monospace; }
.settings-actions {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.file-upload-btn {
  display: inline-block;
  background: var(--accent); color: #fff;
  border: none; border-radius: 6px;
  padding: 6px 14px; font-size: 13px;
  cursor: pointer; transition: background .15s;
}
.file-upload-btn:hover { background: var(--accent-hover); }
.update-progress {
  font-size: 13px; padding: 8px 0;
  color: var(--muted);
}
.update-progress.error { color: #e53935; }
.update-progress.success { color: #43a047; }
.settings-reset-btn {
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 14px; font-size: 13px;
  cursor: pointer; transition: background .15s;
}
.settings-reset-btn:hover { background: #e9ecef; }

/* Toast */
.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #333; color: #fff;
  padding: 10px 20px; border-radius: 8px;
  font-size: 13px; opacity: 0; pointer-events: none;
  transition: opacity .3s, transform .3s;
  z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Dark mode */
body.dark {
  --bg: #1a1a2e;
  --card: #16213e;
  --text: #e0e0e0;
  --muted: #8892b0;
  --border: #2d3a5c;
  --accent: #64b5f6;
  --accent-hover: #90caf9;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
}
body.dark .sidebar .nav-btn:hover { background: #2d3a5c; }
body.dark .modal-row { border-bottom-color: #2d3a5c; }
body.dark .settings-row { border-bottom-color: #2d3a5c; }
body.dark .pagination button:hover:not(:disabled) { background: #2d3a5c; }
body.dark .modal-footer button.secondary { background: #2d3a5c; color: #e0e0e0; border-color: #3d4a6c; }
body.dark .modal-footer button.secondary:hover { background: #3d4a6c; }
body.dark .control-bar button.toggle-btn { background: #2d3a5c; color: #e0e0e0; border-color: #3d4a6c; }
body.dark .control-bar button.toggle-btn:hover:not(.active) { background: #3d4a6c; }
body.dark .fav-group-header:hover { background: #2d3a5c; }
body.dark .settings-reset-btn { background: #2d3a5c; color: #e0e0e0; border-color: #3d4a6c; }
body.dark .settings-reset-btn:hover { background: #3d4a6c; }
body.dark .file-upload-btn { background: var(--accent); color: #1a1a2e; }

/* Responsive */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .search-bar { padding: 0 10px; }
  .search-bar input { font-size: 13px; padding: 6px 10px; }
  .search-bar button { padding: 6px 12px; font-size: 13px; }
}
</style>
</head>
<body>

<!-- 搜索栏 -->
<div class="search-bar">
  <span class="icon">🔍</span>
  <input type="text" id="searchInput" placeholder="输入 U+编码、单个字符或名称关键词..." autocomplete="off">
  <button onclick="doSearch()">搜索</button>
</div>

<!-- 左侧边栏 -->
<nav class="sidebar" id="sidebar">
  <h2>功能菜单</h2>
  <button class="nav-btn" data-view="random" onclick="showRandom()">🎲 随机字符</button>
  <button class="nav-btn active" data-view="blocks" onclick="showBlocks()">📂 按区块浏览</button>
  <button class="nav-btn" data-view="categories" onclick="showCategories()">🏷️ 按类别浏览</button>
  <button class="nav-btn" data-view="emoji" onclick="showEmoji()">😀 表情符号</button>
  <button class="nav-btn" data-view="favorites" onclick="showFavorites()">⭐ 我的收藏</button>
  <div class="sep"></div>
  <div class="theme-toggle">
    <input type="checkbox" id="themeSwitch" onchange="toggleTheme()">
    <label for="themeSwitch">深色模式</label>
  </div>
  <div class="fav-count" id="favCount">收藏: 0 个</div>
  <div class="unicode-version" id="sidebarVersion" onclick="showSettings()">Unicode: 内置</div>
</nav>

<!-- 主内容 -->
<main class="main" id="main">
  <div class="main-header">
    <h1 id="pageTitle">Unicode 字符查询</h1>
    <span class="count" id="pageCount"></span>
  </div>
  <div class="control-bar" id="controlBar"></div>
  <div class="content-scroll" id="contentScroll">
    <div id="content"></div>
  </div>
  <div class="pagination" id="pagination"></div>
</main>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- 设置弹窗 -->
<div class="modal-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal wide" id="settingsModal">
    <button class="modal-close" onclick="closeSettings()">×</button>
    <div class="modal-header">
      <div class="name" style="font-size:20px">⚙️ 设置</div>
    </div>
    <div class="modal-body" id="settingsBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 数据常量
// ============================================================
const BLOCKS = [
  ["基本拉丁字母","Basic Latin",0x0020,0x007E],
  ["拉丁补充","Latin-1 Supplement",0x00A0,0x00FF],
  ["拉丁扩展-A","Latin Extended-A",0x0100,0x017F],
  ["拉丁扩展-B","Latin Extended-B",0x0180,0x024F],
  ["国际音标扩展","IPA Extensions",0x0250,0x02AF],
  ["间距修饰字符","Spacing Modifier Letters",0x02B0,0x02FF],
  ["组合附加符号","Combining Diacritical Marks",0x0300,0x036F],
  ["拉丁扩展附加","Latin Extended Additional",0x1E00,0x1EFF],
  ["希腊语和科普特语","Greek and Coptic",0x0370,0x03FF],
  ["西里尔字母","Cyrillic",0x0400,0x04FF],
  ["亚美尼亚字母","Armenian",0x0530,0x058F],
  ["希伯来字母","Hebrew",0x0590,0x05FF],
  ["阿拉伯字母","Arabic",0x0600,0x06FF],
  ["天城文字母","Devanagari",0x0900,0x097F],
  ["孟加拉字母","Bengali",0x0980,0x09FF],
  ["泰文字母","Thai",0x0E00,0x0E7F],
  ["藏文字母","Tibetan",0x0F00,0x0FFF],
  ["一般标点符号","General Punctuation",0x2000,0x206F],
  ["上标和下标","Superscripts and Subscripts",0x2070,0x209F],
  ["货币符号","Currency Symbols",0x20A0,0x20CF],
  ["字母式符号","Letterlike Symbols",0x2100,0x214F],
  ["数字形式","Number Forms",0x2150,0x218F],
  ["箭头","Arrows",0x2190,0x21FF],
  ["数学运算符","Mathematical Operators",0x2200,0x22FF],
  ["杂项技术符号","Miscellaneous Technical",0x2300,0x23FF],
  ["控制图片","Control Pictures",0x2400,0x243F],
  ["封闭字母数字","Enclosed Alphanumerics",0x2460,0x24FF],
  ["制表符","Box Drawing",0x2500,0x257F],
  ["区块元素","Block Elements",0x2580,0x259F],
  ["几何图形","Geometric Shapes",0x25A0,0x25FF],
  ["杂项符号","Miscellaneous Symbols",0x2600,0x26FF],
  ["叮当符号","Dingbats",0x2700,0x27BF],
  ["补充箭头-A","Supplemental Arrows-A",0x27F0,0x27FF],
  ["补充箭头-B","Supplemental Arrows-B",0x2900,0x297F],
  ["补充数学运算符","Supplemental Mathematical Operators",0x2A00,0x2AFF],
  ["杂项符号和箭头","Miscellaneous Symbols and Arrows",0x2B00,0x2BFF],
  ["一般标点符号补充","Supplemental Punctuation",0x2E00,0x2E7F],
  ["CJK标点和符号","CJK Symbols and Punctuation",0x3000,0x303F],
  ["平假名","Hiragana",0x3040,0x309F],
  ["片假名","Katakana",0x30A0,0x30FF],
  ["注音符号","Bopomofo",0x3100,0x312F],
  ["CJK统一表意文字扩展A","CJK Unified Ideographs Extension A",0x3400,0x4DBF],
  ["CJK统一表意文字","CJK Unified Ideographs",0x4E00,0x9FFF],
  ["谚文音节","Hangul Syllables",0xAC00,0xD7AF],
  ["CJK兼容表意文字","CJK Compatibility Ideographs",0xF900,0xFAFF],
  ["字母表现形式","Alphabetic Presentation Forms",0xFB00,0xFB4F],
  ["阿拉伯表现形式-A","Arabic Presentation Forms-A",0xFB50,0xFDFF],
  ["阿拉伯表现形式-B","Arabic Presentation Forms-B",0xFE70,0xFEFF],
  ["特殊字符","Specials",0xFFF0,0xFFFF],
  ["游戏符号","Mahjong Tiles",0x1F000,0x1F02F],
  ["扑克符号","Domino Tiles",0x1F030,0x1F09F],
  ["杂项符号和象形文字","Miscellaneous Symbols and Pictographs",0x1F300,0x1F5FF],
  ["表情符号","Emoticons",0x1F600,0x1F64F],
  ["交通和地图符号","Transport and Map Symbols",0x1F680,0x1F6FF],
  ["补充符号","Supplemental Symbols",0x1F900,0x1F9FF],
  ["棋类符号","Chess Symbols",0x1FA00,0x1FA6F],
  ["符号和象形文字扩展-A","Symbols and Pictographs Extended-A",0x1FA70,0x1FAFF],
];

// 区块英文名→中文名映射（用于加载外部数据时翻译）
const BLOCK_CN_NAMES = {};
BLOCKS.forEach(b => { BLOCK_CN_NAMES[b[1]] = b[0]; });

const CATEGORY_INFO = {
  'Lu':['大写字母','Letter, Uppercase'],'Ll':['小写字母','Letter, Lowercase'],
  'Lt':['标题字母','Letter, Titlecase'],'Lm':['修饰字母','Letter, Modifier'],
  'Lo':['其他字母','Letter, Other'],'Mn':['非间距标记','Mark, Nonspacing'],
  'Mc':['间距组合标记','Mark, Spacing Combining'],'Me':['封闭标记','Mark, Enclosing'],
  'Nd':['十进制数字','Number, Decimal Digit'],'Nl':['字母数字','Number, Letter'],
  'No':['其他数字','Number, Other'],'Pc':['连接标点','Punctuation, Connector'],

// --- IndexedDB 简易封装 ---
function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = () => { req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  try {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const r = tx.objectStore(IDB_STORE).get(key);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  } catch(e) { return null; }
}
async function idbSet(key, val) {
  try {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(val, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  } catch(e) { console.warn('IDB写入失败:', e); }
}
async function idbDel(key) {
  try {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  } catch(e) {}
}

// --- 加载本地存储的 Unicode 数据 ---

  if (stored && stored.charMapData) {
    unicodeData = {
      version: stored.version || '未知版本',
      source: stored.source || 'stored',
      blocks: stored.blocks || null,
      charMap: new Map(stored.charMapData),
      loaded: true,
    };
  }
  updateVersionDisplay();
}

// --- 上传 UnicodeData.txt ---
async function uploadUCDFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const prog = document.getElementById('fileProgress');
  prog.style.display = 'block';
  prog.className = 'update-progress';
  prog.textContent = `正在解析 ${file.name} ...`;
  try {
    const text = await file.text();
    const charMap = parseUCD(text);
    // 尝试从文件名检测版本
    let ver = unicodeData.version;
    const vm = file.name.match(/unicode[-_]?(\d+\.\d+\.\d+)/i);
    if (vm) ver = `Unicode ${vm[1]}`;

    // 合并已有 blocks
    const existingBlocks = unicodeData.blocks || parseBlocks('');
    const charMapData = [...charMap.entries()];
    await idbSet('unicodeData', {
      version: ver,
      source: 'file',
      blocks: existingBlocks,
      charMapData: charMapData,
      timestamp: Date.now(),
    });
    unicodeData = {
      version: ver, source: 'file',
      blocks: existingBlocks, charMap: charMap, loaded: true,
    };
    nameIndex = null; categoryIndex = null;
    prog.className = 'update-progress success';
    prog.textContent = `✅ 已加载 ${charMap.size} 个字符条目。`;
    updateVersionDisplay();
    refreshSettingsDisplay();
    showToast('UnicodeData.txt 已加载');
  } catch(e) {
    prog.className = 'update-progress error';
    prog.textContent = `❌ 解析失败: ${e.message}`;
  }
  event.target.value = ''; // 重置以便重复上传
}

// --- 解析 UnicodeData.txt ---
function parseUCD(text) {
  const charMap = new Map();
  const lines = text.split('\n');
  let rangeStart = null, rangeCat = null, rangeBidi = null;

  for (const line of lines) {
    if (!line.trim()) continue;
    const f = line.split(';');
    if (f.length < 15) continue;
    const cp = parseInt(f[0], 16);
    if (isNaN(cp)) continue;
    const name = f[1];
    const cat = f[2];
    const combining = parseInt(f[3]) || 0;
    const bidi = f[4];
    const decomp = f[5] || '';
    const mirrored = f[9] || 'N';
    const upper = f[12] || '';
    const lower = f[13] || '';

    // 范围起始
    if (name.endsWith(', First>')) {
      rangeStart = cp;
      rangeCat = cat;
      rangeBidi = bidi;
      continue;
    }
    // 范围结束 → 生成区间内所有字符
    if (name.endsWith(', Last>')) {
      const cleanName = name.replace(/<([^,]+),\s*Last>/, '$1').trim();
      const rangeEnd = cp;
      for (let c = rangeStart; c <= rangeEnd; c++) {
        charMap.set(c, {
          name: generateRangeName(cleanName, c),
          category: rangeCat,
          combining: 0,
          bidi: rangeBidi || 'L',
          decomposition: '',
          mirrored: 'N',
          upper: '', lower: '',
        });
      }
      rangeStart = null;
      continue;
    }

    charMap.set(cp, {
      name: name,
      category: cat,
      combining: combining,
      bidi: bidi,
      decomposition: decomp,
      mirrored: mirrored,
      upper: upper,
      lower: lower,
    });
  }
  return charMap;
}

// 为范围字符生成名称
function generateRangeName(rangeType, cp) {
  const hex = cp.toString(16).toUpperCase().padStart(4, '0');
  const t = rangeType.toUpperCase();
  if (t.includes('CJK UNIFIED IDEOGRAPH')) return `CJK UNIFIED IDEOGRAPH-${hex}`;
  if (t.includes('CJK COMPATIBILITY IDEOGRAPH')) return `CJK COMPATIBILITY IDEOGRAPH-${hex}`;
  if (t.includes('HANGUL SYLLABLE')) return `HANGUL SYLLABLE ${hex}`;
  if (t.includes('TANGUT')) return `TANGUT IDEOGRAPH-${hex}`;
  if (t.includes('NUSHU')) return `NUSHU CHARACTER-${hex}`;
  if (t.includes('EGYPTIAN HIEROGLYPH')) return `EGYPTIAN HIEROGLYPH ${hex}`;
  return `${t} ${hex}`;
}

// --- 解析 Blocks.txt ---
function parseBlocks(text) {
  const blocks = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim() || line.startsWith('#')) continue;
    const m = line.match(/^([0-9A-Fa-f]+)\.\.([0-9A-Fa-f]+)\s*;\s*(.+)$/);
    if (m) {
      blocks.push([m[3].trim(), parseInt(m[1], 16), parseInt(m[2], 16)]);
    }
  }
  return blocks;
}

// 更新侧栏版本显示

}

// ============================================================
// 辅助函数
// ============================================================
function safeChr(cp) {
  if (cp >= 0xD800 && cp <= 0xDFFF) return null;
  if (cp > 0x10FFFF) return null;
  try { return String.fromCodePoint(cp); } catch(e) { return null; }
}

// 优先使用已加载的 Unicode 数据，回退到内置
function getBlockInfo(cp) {
  if (unicodeData.blocks) {
    for (const [enName, start, end] of unicodeData.blocks) {
      if (cp >= start && cp <= end) {
        return [BLOCK_CN_NAMES[enName] || enName, enName];
      }
    }
  }
  for (const [cn,en,start,end] of BLOCKS) {
    if (cp >= start && cp <= end) return [cn,en];
  }
  return ['未知区块','Unknown'];
}

function getCategory(cp) {
  if (unicodeData.charMap && unicodeData.charMap.has(cp)) {
    return unicodeData.charMap.get(cp).category || 'Cn';
  }
  // 回退到启发式
  const ch = safeChr(cp);
  if (!ch) return 'Cn';
  if (/\d/.test(ch)) return 'Nd';
  if (/[A-Z]/.test(ch)) return 'Lu';
  if (/[a-z]/.test(ch)) return 'Ll';
  if (/\s/.test(ch)) return 'Zs';
  return 'Lo';
}

function toUTF8(cp) {
  const ch = safeChr(cp); if (!ch) return '—';
  const encoder = new TextEncoder();
  return Array.from(encoder.encode(ch)).map(b=>b.toString(16).toUpperCase().padStart(2,'0')).join(' ');
}
function toUTF16(cp) {
  const ch = safeChr(cp); if (!ch) return '—';
  const buf = new Uint8Array(2);
  buf[0] = (cp>>8)&0xFF; buf[1] = cp&0xFF;
  return Array.from(buf).map(b=>b.toString(16).toUpperCase().padStart(2,'0')).join(' ');
}
function toHTML(cp) {
  return `&#${cp};`;
}
function toCSS(cp) {
  return `\\${cp.toString(16).toUpperCase().padStart(4,'0')}`;
}
function toURL(cp) {
  const ch = safeChr(cp); if (!ch) return '—';
  return encodeURIComponent(ch);
}

function getCharInfo(cp) {
  const ch = safeChr(cp); if (!ch) return null;
  const [blockCn, blockEn] = getBlockInfo(cp);
  const cat = getCategory(cp);
  const catInfo = CATEGORY_INFO[cat] || ['未知','Unknown'];

  // 从已加载数据获取更详细属性
  let bidi = 'L', bidiDesc = '左到右';
  let combining = 0;
  let decomposition = '无';
  let mirrored = '否';
  let upperMap = '无', lowerMap = '无';

  if (unicodeData.charMap && unicodeData.charMap.has(cp)) {
    const info = unicodeData.charMap.get(cp);
    bidi = info.bidi || 'L';
    bidiDesc = BIDI_DESC[bidi] || bidi;
    combining = info.combining || 0;
    decomposition = info.decomposition ? info.decomposition : '无';
    mirrored = info.mirrored === 'Y' ? '是' : '否';
    if (info.upper) {
      const ucp = parseInt(info.upper, 16);
      const uch = safeChr(ucp);
      upperMap = uch ? `${uch} (U+${info.upper.toUpperCase()})` : `U+${info.upper.toUpperCase()}`;
    }
    if (info.lower) {
      const lcp = parseInt(info.lower, 16);
      const lch = safeChr(lcp);
      lowerMap = lch ? `${lch} (U+${info.lower.toUpperCase()})` : `U+${info.lower.toUpperCase()}`;
    }
  } else {
    // 回退：用 JS 内置大小写
    lowerMap = ch.toLowerCase() !== ch ? `${ch.toLowerCase()} (U+${ch.toLowerCase().codePointAt(0).toString(16).toUpperCase()})` : '无';
    upperMap = ch.toUpperCase() !== ch ? `${ch.toUpperCase()} (U+${ch.toUpperCase().codePointAt(0).toString(16).toUpperCase()})` : '无';
  }

  return {
    char: ch, codepoint: cp,
    name: getCharName(cp) || `U+${cp.toString(16).toUpperCase().padStart(4,'0')}`,
    blockCn, blockEn, category: cat, categoryCn: catInfo[0], categoryEn: catInfo[1],
    utf8: toUTF8(cp), utf16: toUTF16(cp), html: toHTML(cp), css: toCSS(cp), url: toURL(cp),
    decimal: cp, bidi, bidiDesc, combining,
    eastAsianWidth: 'N', eastAsianWidthDesc: '中性',
    mirrored, decomposition, lower: lowerMap, upper: upperMap,
    meaning: getCharMeaning(cp),
  };
}

function getCharDisplay(cp) {
  const ch = safeChr(cp); if (!ch) return '∅';
  const code = ch.charCodeAt(0);
  if (code < 0x20 || code === 0x7F) return '•';
  return ch;

// 获取字符含义（查不到返回 null）
function getCharMeaning(cp) {
  if (CHAR_MEANINGS[cp]) return CHAR_MEANINGS[cp];
  return null;
}

// 获取字符所属语言分区名称
function getCharLang(cp) {
  for (const [id, name, ranges] of LANG_PARTITIONS) {
    for (const [start, end] of ranges) {
      if (cp >= start && cp <= end) return name;
    }
  }
  return '其他';
}

function buildNameIndex() {
  if (nameIndex) return;
  nameIndex = [];
  if (unicodeData.charMap && unicodeData.charMap.size > 0) {
    // 使用已加载的完整数据
    for (const [cp, info] of unicodeData.charMap) {
      if (info.name) nameIndex.push([info.name.toUpperCase(), cp]);
    }
  } else {
    // 回退到内置索引
    for (let cp = 0; cp <= 0xFFFF; cp++) {
      const name = getCharName(cp);
      if (name) nameIndex.push([name.toUpperCase(), cp]);
    }
    for (let cp = 0x1F000; cp <= 0x1FAFF; cp++) {
      const name = getCharName(cp);
      if (name) nameIndex.push([name.toUpperCase(), cp]);
    }
  }
}

function buildCategoryIndex() {
  if (categoryIndex) return;
  categoryIndex = {};
  if (unicodeData.charMap && unicodeData.charMap.size > 0) {
    // 使用已加载的完整数据
    for (const [cp, info] of unicodeData.charMap) {
      const cat = info.category || 'Cn';
      if (!categoryIndex[cat]) categoryIndex[cat] = [];
      categoryIndex[cat].push(cp);
    }
  } else {
    // 回退到遍历 BMP
    for (let cp = 0; cp <= 0xFFFF; cp++) {
      const ch = safeChr(cp); if (!ch) continue;
      const cat = getCategory(cp);
      if (!categoryIndex[cat]) categoryIndex[cat] = [];
      categoryIndex[cat].push(cp);
    }
  }
}

function renderRandomControls() {
  const bar = document.getElementById('controlBar');
  // 构建分区选项

  }

  for (let i = 0; i < BLOCKS.length; i++) {
    options += `<option value="block:${i}">${BLOCKS[i][0]}</option>`;
  }
  options += '</optgroup>';
  options += '<optgroup label="── 按类别 ──">';
  for (const cat of Object.keys(CATEGORY_INFO).sort()) {
    options += `<option value="cat:${cat}">${CATEGORY_INFO[cat][0]} (${cat})</option>`;
  }
  options += '</optgroup>';

  bar.innerHTML = `

      <select id="randomPartition" onchange="onRandomPartitionChange()">
        ${options}
      </select>
      <span class="ctrl-label">数量:</span>
      <input type="number" id="randomCount" value="${randomCount}" min="10" max="2000" style="width:70px" onchange="onRandomPartitionChange()">
      <button class="reroll-btn" onclick="generateRandomChars()">🎲 摇一摇</button>
    </div>
  `;
  bar.style.display = 'flex';
  bar.querySelector('#randomPartition').value = randomPartition;

function onRandomPartitionChange() {
  randomPartition = document.getElementById('randomPartition').value;
  randomCount = parseInt(document.getElementById('randomCount').value) || 200;
  if (randomCount < 10) randomCount = 10;
  if (randomCount > 2000) randomCount = 2000;
  generateRandomChars();
}

function generateRandomChars() {
  randomCount = parseInt(document.getElementById('randomCount')?.value) || randomCount;
  const chars = [];

  if (randomPartition === 'all') {
    // 全部区域随机
    for (let i = 0; i < randomCount; i++) {
      const [start,end] = RANDOM_RANGES[Math.floor(Math.random()*RANDOM_RANGES.length)];
      const cp = Math.floor(Math.random()*(end-start+1)) + start;
      if (safeChr(cp) && getCharName(cp)) chars.push(cp);
    }
  } else if (randomPartition.startsWith('block:')) {
    // 指定区块随机
    const idx = parseInt(randomPartition.split(':')[1]);
    const [cn,en,start,end] = BLOCKS[idx];
    const range = end - start + 1;
    if (range > randomCount * 3) {
      // 大区间：随机采样
      const seen = new Set();
      let attempts = 0;
      while (chars.length < randomCount && attempts < randomCount * 10) {
        const cp = Math.floor(Math.random()*range) + start;
        if (safeChr(cp) && !seen.has(cp)) { chars.push(cp); seen.add(cp); }
        attempts++;
      }
    } else {
      // 小区间：打乱取前 N 个
      const pool = [];
      for (let cp = start; cp <= end; cp++) {
        if (safeChr(cp)) pool.push(cp);
      }
      // Fisher-Yates 洗牌
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      chars.push(...pool.slice(0, Math.min(randomCount, pool.length)));
    }
    setTitle(`🎲 随机字符 — ${cn}`);
  } else if (randomPartition.startsWith('cat:')) {
    // 指定类别随机
    const cat = randomPartition.split(':')[1];
    buildCategoryIndex();
    const pool = categoryIndex[cat] || [];
    if (pool.length === 0) {
      const el = document.getElementById('content');
      el.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);font-size:16px">该类别暂无字符数据<br>请先在设置中更新 Unicode 数据库</div>';
      document.getElementById('pagination').innerHTML = '';
      setCount('');
      return;
    }
    const seen = new Set();
    let attempts = 0;
    while (chars.length < randomCount && attempts < randomCount * 10) {
      const cp = pool[Math.floor(Math.random()*pool.length)];
      if (!seen.has(cp)) { chars.push(cp); seen.add(cp); }
      attempts++;
    }
    setTitle(`🎲 随机字符 — ${CATEGORY_INFO[cat][0]} (${cat})`);
  } else if (randomPartition.startsWith('lang:')) {
    // 指定语言分区随机
    const langId = randomPartition.split(':')[1];
    const langEntry = LANG_PARTITIONS.find(p => p[0] === langId);
    if (!langEntry) { currentChars = []; renderGrid(); return; }
    const [, langName, ranges] = langEntry;
    // 计算总范围大小
    let totalSize = 0;
    for (const [s, e] of ranges) totalSize += (e - s + 1);
    if (totalSize > randomCount * 5) {
      // 大范围：随机采样
      const seen = new Set();
      let attempts = 0;
      while (chars.length < randomCount && attempts < randomCount * 20) {
        const [start, end] = ranges[Math.floor(Math.random() * ranges.length)];
        const cp = Math.floor(Math.random() * (end - start + 1)) + start;
        if (safeChr(cp) && getCharName(cp) && !seen.has(cp)) {
          chars.push(cp); seen.add(cp);
        }
        attempts++;
      }
    } else {
      // 小范围：打乱取前 N 个
      const pool = [];
      for (const [start, end] of ranges) {
        for (let cp = start; cp <= end; cp++) {
          if (safeChr(cp) && getCharName(cp)) pool.push(cp);
        }
      }
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      chars.push(...pool.slice(0, Math.min(randomCount, pool.length)));
    }
    setTitle(`🎲 随机字符 — ${langName}`);
  }

  currentChars = chars;
  currentPage = 0;
  renderGrid();
  document.getElementById('contentScroll').scrollTop = 0;
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  clearControlBar();

  // 编码点
  const m = q.match(/^(?:[Uu]\+|0[xX])?([0-9A-Fa-f]+)$/);
  if (m) {
    const cp = parseInt(m[1], 16);
    if (cp >= 0 && cp <= 0x10FFFF && !(cp >= 0xD800 && cp <= 0xDFFF)) {
      showDetail(cp); return;
    }
  }
  if (/^\d+$/.test(q)) {
    const cp = parseInt(q, 10);
    if (cp >= 0 && cp <= 0x10FFFF && !(cp >= 0xD800 && cp <= 0xDFFF)) {
      showDetail(cp); return;
    }
  }

  // 单个字符
  if ([...q].length === 1) {
    showDetail(q.codePointAt(0)); return;
  }

  // 名称搜索
  buildNameIndex();
  const qu = q.toUpperCase();
  const results = [];
  for (const [name, cp] of nameIndex) {
    if (name.includes(qu)) { results.push(cp); if (results.length >= 500) break; }
  }
  if (results.length) {
    currentChars = results; currentPage = 0;
    setTitle(`搜索: "${q}"`);
    setActiveNav(null);
    renderGrid();
    document.getElementById('contentScroll').scrollTop = 0;
  } else {
    alert(`未找到匹配 "${q}" 的字符。\n\n提示：输入 U+4E2D 查找编码点，或输入单个字符如 "中"。\n如需更全面的名称搜索，请在设置中更新 Unicode 数据库。`);
  }
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

      ${row('类别', `${info.category} (${info.categoryCn})`)}

      ${row('含义', info.meaning || '无')}
    </div>
    <div class="modal-section"><h3>🔢 编码信息</h3>
      ${row('UTF-8', info.utf8)}
      ${row('HTML 实体', info.html)}
      ${row('CSS 转义', info.css)}
      ${row('URL 编码', info.url)}
    </div>
    <div class="modal-section"><h3>📊 其他属性</h3>
      ${row('双向类别', `${info.bidi} (${info.bidiDesc})`)}
      ${row('组合类', info.combining)}
      ${row('分解映射', info.decomposition)}
      ${row('镜像', info.mirrored)}
      ${row('大写映射', info.upper)}
      ${row('小写映射', info.lower)}
    </div>
  `;

  document.getElementById('modalFooter').innerHTML = `
    <button onclick="copyText('${info.char.replace(/'/g,"\\'")}')">复制字符</button>
    <button onclick="copyText('U+${info.codepoint.toString(16).toUpperCase().padStart(4,'0')}')">复制编码</button>
    <button onclick="copyText('${info.html.replace(/'/g,"\\'")}')">复制 HTML</button>
    <button onclick="copyText('${info.utf8}')">复制 UTF-8</button>
    <button class="secondary" onclick="toggleFavModal(${cp})">${isFav?'⭐ 已收藏':'☆ 收藏'}</button>
  `;

  document.getElementById('modalOverlay').classList.add('show');
}
function row(label, value) {
  return `<div class="modal-row"><span class="label">${label}</span><span class="value">${value||'—'}</span></div>`;
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast(`已复制: ${text.slice(0,30)}`)).catch(() => {
    const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast(`已复制: ${text.slice(0,30)}`);
  });
}
function toggleFavModal(cp) {
  if (favorites.has(cp)) { favorites.delete(cp); showToast('已取消收藏'); }
  else { favorites.add(cp); showToast('已加入收藏'); }
  saveFavorites();
  showDetail(cp);
  if (currentView === 'favorites') { renderFavorites(); }
  else if (currentView !== 'blocks' && currentView !== 'categories') { renderGrid(); }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

      </div>
    </div>

    <div class="settings-section">
      <h3>📁 从文件更新</h3>
      <p>如果无法访问 CDN，可从 <a href="https://www.unicode.org/Public/UCD/latest/ucd/" target="_blank">unicode.org</a> 手动下载以下文件并上传：</p>
      <div class="settings-actions">
        <label class="file-upload-btn">
          📄 UnicodeData.txt
          <input type="file" accept=".txt,text/plain" onchange="uploadUCDFile(event)" style="display:none">
        </label>
        <label class="file-upload-btn">
          📄 Blocks.txt
          <input type="file" accept=".txt,text/plain" onchange="uploadBlocksFile(event)" style="display:none">
        </label>
      </div>
      <div id="fileProgress" class="update-progress" style="display:none"></div>
    </div>

    <div class="settings-section">
      <h3>↩️ 重置</h3>
      <p>清除已下载/上传的数据，恢复为内置简化版数据。</p>
      <button class="settings-reset-btn" onclick="resetUnicodeData()">恢复内置数据</button>
    </div>

    <div class="settings-section">
      <h3>ℹ️ 关于</h3>
      <p>本工具基于 Unicode Character Database (UCD) 提供字符查询、浏览和收藏功能。内置数据为简化版，包含基本区块定义和常见字符名称。上传完整数据后可获得所有字符的名称、类别、双向属性等信息。</p>
    </div>
  `;
}

function refreshSettingsDisplay() {
  // 如果设置面板打开着，刷新内容
  if (document.getElementById('settingsOverlay').classList.contains('show')) {
    renderSettingsBody();
  }
}

// ============================================================
// 主题
// ============================================================
function toggleTheme() {
  document.body.classList.toggle('dark', document.getElementById('themeSwitch').checked);
}

// ============================================================
// 收藏快捷操作（从主页面）
// ============================================================
function toggleFavorite(cp) {
  if (favorites.has(cp)) favorites.delete(cp); else favorites.add(cp);
  saveFavorites();
  if (currentView === 'favorites') { renderFavorites(); }
  else renderGrid();
}

// ============================================================
// 初始化
// ============================================================
showBlocks();
// 异步加载已存储的 Unicode 数据（不阻塞初始渲染）
loadStoredUnicodeData().then(() => {
  // 数据加载完成后无需重新渲染，所有查询函数会动态检查 unicodeData
});
</script>
</body>
</html>
